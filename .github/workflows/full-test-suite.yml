name: Full Test Suite

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Which tests to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - backend
          - frontend

jobs:
  backend-lint:
    name: Backend Lint & Static Analysis
    runs-on: ubuntu-latest
    if: ${{ inputs.scope == 'both' || inputs.scope == 'backend' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install ruff vulture

      - name: Ruff lint
        working-directory: backend
        run: ruff check src/ --exclude src/validate_pattern/ --output-format=github

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check src/ --exclude src/validate_pattern/

      - name: Vulture dead code check
        working-directory: backend
        run: vulture src/ vulture_whitelist.py --min-confidence 80 --exclude validate_pattern/

  backend-tests:
    name: Backend Full Test Suite
    runs-on: ubuntu-latest
    if: ${{ inputs.scope == 'both' || inputs.scope == 'backend' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest-cov pytest-html

      - name: Run all unit tests
        working-directory: backend
        run: |
          python -m pytest tests/unit/ \
            --tb=short -q \
            --cov=src --cov-report=html:reports/coverage-html --cov-report=xml:reports/coverage.xml \
            --junitxml=reports/junit-results.xml \
            --html=reports/test-report.html --self-contained-html \
            2>&1 | tee reports/test-output.txt || true
        env:
          TESTING: "true"
          DB_HOST: "localhost"
          DB_USER: "test"
          DB_PASSWORD: "test"
          DB_NAME: "test"

      - name: Generate summary
        if: always()
        working-directory: backend
        run: |
          echo "## Backend Test Results" > reports/SUMMARY.md
          echo "" >> reports/SUMMARY.md
          echo "Run date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> reports/SUMMARY.md
          echo "" >> reports/SUMMARY.md
          # Extract pass/fail counts from output
          tail -5 reports/test-output.txt >> reports/SUMMARY.md

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/reports/
          retention-days: 30

  frontend-tests:
    name: Frontend Full Test Suite
    runs-on: ubuntu-latest
    if: ${{ inputs.scope == 'both' || inputs.scope == 'frontend' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run all tests
        working-directory: frontend
        run: |
          npx vitest run --reporter=verbose --reporter=junit --outputFile=reports/junit-results.xml \
            2>&1 | tee reports/test-output.txt || true
        env:
          VITE_API_URL: http://localhost:5000
          VITE_COGNITO_USER_POOL_ID: eu-west-1_TestPool123
          VITE_COGNITO_CLIENT_ID: test-client-id
          VITE_COGNITO_DOMAIN: test.auth.eu-west-1.amazoncognito.com
          VITE_AWS_REGION: eu-west-1
          VITE_REDIRECT_SIGN_IN: http://localhost:3000/
          VITE_REDIRECT_SIGN_OUT: http://localhost:3000/
          VITE_DOCS_URL: /docs

      - name: Generate summary
        if: always()
        working-directory: frontend
        run: |
          mkdir -p reports
          echo "## Frontend Test Results" > reports/SUMMARY.md
          echo "" >> reports/SUMMARY.md
          echo "Run date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> reports/SUMMARY.md
          echo "" >> reports/SUMMARY.md
          tail -10 reports/test-output.txt >> reports/SUMMARY.md

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: frontend/reports/
          retention-days: 30
