name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: ESLint
        working-directory: frontend
        run: npx eslint --max-warnings=0

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: frontend
        run: npx vitest run --reporter=verbose
        env:
          VITE_API_URL: http://localhost:5000
          VITE_COGNITO_USER_POOL_ID: eu-west-1_TestPool123
          VITE_COGNITO_CLIENT_ID: test-client-id
          VITE_COGNITO_DOMAIN: test.auth.eu-west-1.amazoncognito.com
          VITE_AWS_REGION: eu-west-1
          VITE_REDIRECT_SIGN_IN: http://localhost:3000/
          VITE_REDIRECT_SIGN_OUT: http://localhost:3000/
          VITE_DOCS_URL: /docs

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        run: npm run build:ci
        env:
          CI: false
          VITE_API_URL: http://localhost:5000
          VITE_COGNITO_USER_POOL_ID: test
          VITE_COGNITO_CLIENT_ID: test
          VITE_COGNITO_DOMAIN: test
          VITE_AWS_REGION: eu-west-1
          VITE_REDIRECT_SIGN_IN: http://localhost:3000/
          VITE_REDIRECT_SIGN_OUT: http://localhost:3000/
          VITE_DOCS_URL: /docs
