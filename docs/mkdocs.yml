site_name: myAdmin Documentatie
site_description: Gebruikersdocumentatie voor myAdmin financieel beheer
site_url: "https://invigorating-celebration-production.up.railway.app/docs/"

theme:
  name: material
  language: nl
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate
  palette:
    - scheme: default
      primary: red
      accent: red

plugins:
  - search:
      lang:
        - nl
        - en
  - i18n:
      languages:
        - locale: nl
          name: Nederlands
          default: true
          build: true
        - locale: en
          name: English
          build: true
  - print-site:
      enabled: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Aan de slag:
      - Overzicht: getting-started/overview.md
      - Eerste login: getting-started/first-login.md
      - Test vs Productie: getting-started/test-vs-production.md
      - Veelgebruikte workflows: getting-started/common-workflows.md
      - Modules instellen: getting-started/onboarding.md
  - Bankzaken:
      - Overzicht: banking/index.md
      - Afschriften importeren: banking/importing-statements.md
      - Transacties controleren: banking/reviewing-transactions.md
      - Patronen herkenning: banking/pattern-matching.md
      - Duplicaten afhandelen: banking/handling-duplicates.md
  - Facturen:
      - Overzicht: invoices/index.md
      - Facturen uploaden: invoices/uploading-invoices.md
      - AI extractie: invoices/ai-extraction.md
      - Bewerken & goedkeuren: invoices/editing-approving.md
      - Google Drive: invoices/google-drive.md
  - ZZP Facturatie:
      - Overzicht: zzp/index.md
      - Contacten: zzp/contacts.md
      - Producten & diensten: zzp/products.md
      - Facturen aanmaken: zzp/creating-invoices.md
      - Facturen versturen: zzp/sending-invoices.md
      - Creditnota's: zzp/credit-notes.md
      - Urenregistratie: zzp/time-tracking.md
      - Debiteuren & crediteuren: zzp/debtors.md
  - STR:
